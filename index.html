<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BTC Signal">
<title>BTC Signal</title>
<style>
  :root { --bg:#0d1421; --card:#16213a; --line:#243352; --tx:#e8eef7; --dim:#8fa3bf;
          --up:#22c87a; --dn:#f05454; --gold:#f0b454; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:var(--bg); color:var(--tx); font-family:-apple-system,system-ui,sans-serif;
         padding:max(12px,env(safe-area-inset-top)) 14px 30px; max-width:560px; margin:0 auto; }
  h1 { font-size:20px; padding:10px 2px 14px; display:flex; justify-content:space-between; align-items:center; }
  h1 small { font-size:12px; color:var(--dim); font-weight:400; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:14px;
          padding:14px; margin-bottom:12px; }
  .pos { display:flex; justify-content:space-between; align-items:center; }
  .pos .side { font-size:26px; font-weight:700; }
  .pos .price { text-align:right; }
  .pos .price b { font-size:22px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 14px; margin-top:12px; }
  .kv { font-size:13px; color:var(--dim); }
  .kv b { display:block; font-size:15px; color:var(--tx); margin-top:1px; font-weight:600; }
  canvas { width:100%; height:190px; display:block; }
  .long { color:var(--up); } .short { color:var(--dn); } .flat { color:var(--dim); }
  .row { display:flex; justify-content:space-between; font-size:13px; color:var(--dim); padding:3px 0; }
  .row b { color:var(--tx); font-weight:600; }
  button { width:100%; background:#2563eb; border:0; color:#fff; padding:13px; font-size:16px;
           border-radius:10px; font-weight:600; margin-top:10px; }
  input { width:100%; background:#0d1421; border:1px solid var(--line); color:var(--tx);
          padding:11px; border-radius:9px; font-size:15px; margin-top:8px; }
  label { font-size:12px; color:var(--dim); display:block; margin-top:12px; }
  .err { color:var(--dn); font-size:13px; margin-top:10px; white-space:pre-wrap; }
  .footer { text-align:center; color:var(--dim); font-size:11px; margin-top:14px; }
  .footer a { color:var(--dim); }
  #setup, #main { display:none; }
</style>
</head>
<body>
<h1>₿ BTC Signal <small id="upd"></small></h1>

<div id="setup" class="card">
  <div style="font-size:15px;font-weight:600">One-time connection</div>
  <label>GitHub username</label><input id="in-user" placeholder="e.g. brianp" autocapitalize="none">
  <label>Repository name</label><input id="in-repo" placeholder="e.g. BTC-Signal" autocapitalize="none">
  <label>Fine-grained token (read-only, Contents permission)</label>
  <input id="in-token" placeholder="github_pat_..." autocapitalize="none">
  <button onclick="saveSetup()">Connect</button>
  <div class="err" id="setup-err"></div>
  <div class="footer">The token is stored only on this device and is used
  read-only to fetch your signal data.</div>
</div>

<div id="main">
  <div class="card pos">
    <div>
      <div class="side" id="side">—</div>
      <div class="kv" id="regime"></div>
    </div>
    <div class="price">
      <b id="px">—</b>
      <div class="kv" id="pxd"></div>
    </div>
  </div>

  <div class="card"><canvas id="chart"></canvas></div>

  <div class="card">
    <div class="grid">
      <div class="kv">Entry<b id="entry">—</b></div>
      <div class="kv">Confidence<b id="conf">—</b></div>
      <div class="kv">Target<b id="target">—</b></div>
      <div class="kv">Cut-loss<b id="cutloss">—</b></div>
    </div>
  </div>

  <div class="card">
    <div class="row"><span>Sim net worth</span><b id="net">—</b></div>
    <div class="row"><span>Cumulative raw PnL</span><b id="cum">—</b></div>
    <div class="row"><span>Cash / Margin</span><b id="cm">—</b></div>
  </div>
  <button onclick="loadAll()">Refresh</button>
  <div class="err" id="main-err"></div>
  <div class="footer"><a href="#" onclick="resetSetup();return false">Change connection settings</a></div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt = (n,d=0) => n==null?'—':'$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:d});
const CFG = () => JSON.parse(localStorage.getItem('btccfg')||'null');

function show(which){ $('setup').style.display = which==='setup'?'block':'none';
                      $('main').style.display = which==='main'?'block':'none'; }
function resetSetup(){ localStorage.removeItem('btccfg'); show('setup'); }
function saveSetup(){
  const c = { user:$('in-user').value.trim(), repo:$('in-repo').value.trim(),
              token:$('in-token').value.trim() };
  if(!c.user||!c.repo||!c.token){ $('setup-err').textContent='Please fill all three fields.'; return; }
  localStorage.setItem('btccfg', JSON.stringify(c));
  show('main'); loadAll();
}

async function gh(path){
  const c = CFG();
  const r = await fetch(`https://api.github.com/repos/${c.user}/${c.repo}/contents/${path}`,
    { headers:{ Authorization:`Bearer ${c.token}`, Accept:'application/vnd.github.raw+json' }});
  if(!r.ok) throw new Error(`GitHub ${r.status} loading ${path}` +
    (r.status===401?' — token invalid/expired':r.status===404?' — check username/repo name':''));
  return r.text();
}

function drawChart(rows, entry, stop){
  const cv=$('chart'), dpr=window.devicePixelRatio||1;
  cv.width=cv.clientWidth*dpr; cv.height=cv.clientHeight*dpr;
  const x=cv.getContext('2d'); x.scale(dpr,dpr);
  const W=cv.clientWidth, H=cv.clientHeight, P=6;
  const px=rows.map(r=>r.c);
  let lo=Math.min(...px), hi=Math.max(...px);
  if(stop>0){lo=Math.min(lo,stop);hi=Math.max(hi,stop);}
  const pad=(hi-lo)*0.06; lo-=pad; hi+=pad;
  const X=i=>P+(W-2*P)*i/(px.length-1), Y=v=>H-P-(H-2*P)*(v-lo)/(hi-lo);
  // price line
  x.beginPath(); px.forEach((v,i)=>i?x.lineTo(X(i),Y(v)):x.moveTo(X(i),Y(v)));
  x.strokeStyle='#5b9cf5'; x.lineWidth=1.8; x.stroke();
  // fill
  x.lineTo(X(px.length-1),H-P); x.lineTo(X(0),H-P); x.closePath();
  x.fillStyle='rgba(91,156,245,.12)'; x.fill();
  const hline=(v,color,label)=>{ if(!v||v<lo||v>hi)return;
    x.beginPath(); x.setLineDash([5,4]); x.moveTo(P,Y(v)); x.lineTo(W-P,Y(v));
    x.strokeStyle=color; x.lineWidth=1; x.stroke(); x.setLineDash([]);
    x.fillStyle=color; x.font='10px -apple-system'; x.fillText(label+' '+Math.round(v).toLocaleString(),P+2,Y(v)-3); };
  hline(entry,'#f0b454','entry'); hline(stop,'#f05454','stop');
}

async function loadAll(){
  $('main-err').textContent='';
  try{
    const [stateRaw, csvRaw] = await Promise.all([gh('state.json'), gh('data/btc_history.csv')]);
    const s = JSON.parse(stateRaw).state, last = JSON.parse(stateRaw).last_date;
    const lines = csvRaw.trim().split('\n').slice(1);
    const rows = lines.slice(-180).map(l=>{ const p=l.split(','); return {d:p[0], c:+p[1]}; });
    const price = rows[rows.length-1].c, prev = rows[rows.length-2].c;

    const bw = s.BW;
    $('side').textContent = bw===1?'LONG':bw===-1?'SHORT':'FLAT';
    $('side').className = 'side '+(bw===1?'long':bw===-1?'short':'flat');
    $('regime').textContent = `engine ${s.BK} · data to ${JSON.parse(stateRaw).last_date}`;
    $('px').textContent = fmt(price);
    const chg=(price/prev-1)*100;
    $('pxd').textContent = (chg>=0?'+':'')+chg.toFixed(2)+'% vs prev day';
    $('pxd').style.color = chg>=0?'var(--up)':'var(--dn)';
    $('entry').textContent = bw!==0?fmt(s.BY):'—';
    $('conf').textContent = bw!==0?`${s.CF}/10 · size ${(s.CG*100).toFixed(0)}%`:'—';
    $('target').textContent = bw!==0&&s.BU>0?fmt(s.BU):'—';
    $('cutloss').textContent = bw!==0&&s.BV>1?fmt(s.BV):'—';
    $('net').textContent = fmt(s.CQ);
    $('cum').textContent = fmt(s.CB);
    $('cm').textContent = `${fmt(s.CN)} / ${fmt(s.CO)}`;
    $('upd').textContent = 'updated '+last;
    drawChart(rows, bw!==0?s.BY:0, bw!==0&&s.BV>1?s.BV:0);
  }catch(e){ $('main-err').textContent = e.message +
    '\nIf this keeps happening: check the token has not expired, then Change connection settings below.'; }
}

if(CFG()){ show('main'); loadAll(); } else show('setup');
</script>
</body>
</html>
